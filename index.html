<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Obsidianを開く</title>
<style>
  body { font-family: sans-serif; text-align: center; margin-top: 15vh; background: #fafafa; }
  #open {
    display: inline-block; padding: 20px 48px; font-size: 1.3em; font-weight: bold;
    color: #fff; background: #7c3aed; border-radius: 12px; text-decoration: none;
    box-shadow: 0 2px 8px rgba(0,0,0,.2);
  }
  #open:active { transform: scale(.97); }
  #name { color: #555; margin-top: 18px; font-size: .95em; }
  #hint { color: #999; margin-top: 24px; font-size: .8em; }
</style>
</head>
<body>
<p><a id="open" href="#">Obsidianで開く</a></p>
<p id="name"></p>
<p id="hint">初回は「Obsidianを開きますか？」の確認が出ます。<br>「常に許可」にチェックすると次回から自動で開きます。</p>
<script>
(function () {
  var params = new URLSearchParams(location.search);
  var target = params.get('t') || 'board';
  var vault = 'Obsidian Vault';
  // JST基準の現在日時（端末のタイムゾーンに依存させない）
  var jst = new Date(Date.now() + 9 * 3600 * 1000);
  function fmt(d) {
    return d.getUTCFullYear() + '-' +
      String(d.getUTCMonth() + 1).padStart(2, '0') + '-' +
      String(d.getUTCDate()).padStart(2, '0');
  }
  var file;
  if (target === 'daily') {
    file = 'Daily Notes/' + fmt(jst) + '_予定表';
  } else if (target === 'weekly') {
    var dow = (jst.getUTCDay() + 6) % 7; // 月曜=0
    var monday = new Date(jst.getTime() - dow * 86400000);
    file = 'Weekly/' + fmt(monday) + '_週次パイプライン';
  } else {
    file = 'Claude/_daily_clients';
  }
  var uri = 'obsidian://open?vault=' + encodeURIComponent(vault) + '&file=' + encodeURIComponent(file);
  var btn = document.getElementById('open');
  btn.href = uri;
  document.getElementById('name').textContent = file;
  // 起動発火後にタブを自分で閉じる（カレンダー等から新規タブで開かれた場合のみ有効）。
  // ただし初回訪問は「常に許可」ダイアログを消してしまわないよう閉じない。
  function closeSoon(ms) { setTimeout(function () { window.close(); }, ms); }
  var seen = false;
  try { seen = !!localStorage.getItem('od_seen'); } catch (e) {}
  function markSeen() { try { localStorage.setItem('od_seen', '1'); } catch (e) {} }
  btn.addEventListener('click', function () {
    if (seen) closeSoon(1500);
    markSeen(); seen = true;
  });
  // 「常に許可」済みの環境ではこの自動起動が効く。未許可ならボタンクリックで。
  location.href = uri;
  if (seen) closeSoon(2000);
  markSeen();
})();
</script>
</body>
</html>
